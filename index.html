<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Empresarial</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="login">

<h1>Sistema Empresarial</h1>

<input id="loginUser" placeholder="Usuário">
<input id="loginPass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<h3>Criar Conta</h3>

<input id="regUser" placeholder="Novo usuário">
<input id="regPass" type="password" placeholder="Nova senha">

<button onclick="register()">Cadastrar</button>

</div>

<div id="dashboard">

<header>

<h2>Painel da Empresa</h2>

<button onclick="logout()">Sair</button>

</header>

<div class="menu">

<button onclick="openPage('produtos')">Peças</button>
<button onclick="openPage('vendas')">Vendas</button>
<button onclick="openPage('relatorio')">Relatório</button>

</div>

<section id="produtos" class="page">

<h3>Cadastrar Peça</h3>

<input id="nomePeca" placeholder="Nome">
<input id="marcaPeca" placeholder="Marca">
<input id="precoPeca" placeholder="Preço">

<button onclick="addProduto()">Cadastrar</button>

<table>

<thead>
<tr>
<th>Produto</th>
<th>Marca</th>
<th>Preço</th>
</tr>
</thead>

<tbody id="listaProdutos"></tbody>

</table>

</section>


<section id="vendas" class="page">

<h3>Registrar Venda</h3>

<input id="cliente" placeholder="Cliente">
<input id="produto" placeholder="Produto">
<input id="valor" placeholder="Valor">

<button onclick="addVenda()">Registrar</button>

<table>

<thead>
<tr>
<th>Cliente</th>
<th>Produto</th>
<th>Valor</th>
</tr>
</thead>

<tbody id="listaVendas"></tbody>

</table>

</section>


<section id="relatorio" class="page">

<h3>Relatório de vendas</h3>

<p id="totalVendas"></p>

</section>

</div>

<script src="app.js"></script>

</body>
</html>
