<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Empresa</title>
<link rel="stylesheet" href="Style.css">
</head>

<body>

<!-- CADASTRO -->
<div id="cadastro" class="tela">

<h2>Criar conta</h2>

<input id="novoUser" placeholder="Usuário">
<input id="novoPass" type="password" placeholder="Senha">

<button onclick="criarConta()">Cadastrar</button>

<p>Já tem conta?</p>
<button onclick="irLogin()">Ir para login</button>

</div>


<!-- LOGIN -->
<div id="login" class="tela oculto">

<h2>Login</h2>

<input id="userLogin" placeholder="Usuário">
<input id="passLogin" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>


<!-- PAINEL -->
<div id="painel" class="oculto">

<header>

<h2>Painel da empresa</h2>

<button class="sair" onclick="logout()">Sair</button>

</header>

<div class="menu">

<button onclick="abrir('pecas')">Peças</button>
<button onclick="abrir('vendas')">Vendas</button>

</div>


<section id="pecas" class="pagina">

<h3>Cadastrar peça</h3>

<input id="nomePeca" placeholder="Nome da peça">
<input id="marcaPeca" placeholder="Marca">
<input id="precoPeca" placeholder="Preço">

<button onclick="addPeca()">Cadastrar</button>

<table>

<thead>
<tr>
<th>Peça</th>
<th>Marca</th>
<th>Preço</th>
</tr>
</thead>

<tbody id="listaPecas"></tbody>

</table>

</section>


<section id="vendas" class="pagina oculto">

<h3>Registrar venda</h3>

<input id="clienteVenda" placeholder="Cliente">
<input id="produtoVenda" placeholder="Produto">
<input id="valorVenda" placeholder="Valor">

<button onclick="addVenda()">Registrar</button>

<table>

<thead>
<tr>
<th>Cliente</th>
<th>Produto</th>
<th>Valor</th>
</tr>
</thead>

<tbody id="listaVendas"></tbody>

</table>

</section>

</div>

<script src="app.js"></script>

</body>
</html>
